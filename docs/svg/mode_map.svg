<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">FeelIT mode map</title>
  <desc id="desc">Mode map for FeelIT showing five routed workspaces, their current role, and the shared contract that ties the application together.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#152132"/>
      <stop offset="100%" stop-color="#101722"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#79c0ff"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', sans-serif; fill: #e6edf3; }
      .subtitle { font: 400 18px 'Segoe UI', sans-serif; fill: #8b949e; }
      .cardTitle { font: 700 24px 'Segoe UI', sans-serif; fill: #e6edf3; }
      .section { font: 700 13px 'Segoe UI', sans-serif; fill: #8b949e; letter-spacing: 1.2px; }
      .body { font: 400 16px 'Segoe UI', sans-serif; fill: #9fb0c3; }
      .mono { font: 400 14px Consolas, monospace; fill: #d7e2ee; }
      .badge { font: 700 12px 'Segoe UI', sans-serif; fill: #0d1117; letter-spacing: 1px; }
      .smallBadge { font: 700 12px 'Segoe UI', sans-serif; fill: #e6edf3; letter-spacing: 0.8px; }
      .legend { font: 600 14px 'Segoe UI', sans-serif; fill: #d3deea; }
      .iconStroke { stroke: #e6edf3; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>
  <circle cx="1450" cy="180" r="220" fill="#58a6ff" opacity="0.06"/>
  <circle cx="220" cy="900" r="220" fill="#c297ff" opacity="0.05"/>

  <text x="78" y="102" class="title">FeelIT Mode Map</text>
  <text x="78" y="136" class="subtitle">Each route owns one primary job, but all five sit inside the same blind-first shell, backend boundary, and release-governed documentation surface.</text>

  <rect x="78" y="192" width="470" height="286" rx="26" fill="url(#card)" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="566" y="192" width="470" height="286" rx="26" fill="url(#card)" stroke="#7ee787" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1054" y="192" width="470" height="286" rx="26" fill="url(#card)" stroke="#c297ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="202" y="512" width="470" height="286" rx="26" fill="url(#card)" stroke="#f2cc60" stroke-width="2" filter="url(#shadow)"/>
  <rect x="930" y="512" width="470" height="286" rx="26" fill="url(#card)" stroke="#ff7b72" stroke-width="2" filter="url(#shadow)"/>

  <circle cx="132" cy="250" r="24" fill="rgba(88,166,255,0.18)" stroke="#58a6ff"/>
  <path d="M120 252 L132 244 L144 252 L144 266 L132 274 L120 266 Z" class="iconStroke"/>
  <path d="M132 244 V258" class="iconStroke"/>
  <path d="M120 252 L132 260 L144 252" class="iconStroke"/>
  <rect x="168" y="228" width="92" height="28" rx="14" fill="#58a6ff"/>
  <text x="190" y="246" class="badge">STAGED</text>
  <text x="108" y="308" class="cardTitle">3D Object Explorer</text>
  <text x="108" y="336" class="mono">/object-explorer</text>
  <text x="108" y="382" class="section">PRIMARY ROLE</text>
  <text x="108" y="410" class="body">Start bounded object-study sessions from a scene launcher</text>
  <text x="108" y="434" class="body">for real multi-format geometry and tactile materials.</text>
  <text x="108" y="482" class="section">CURRENT BASELINE</text>
  <text x="108" y="510" class="body">Paged launcher, local multi-format staging, persistent view,</text>
  <text x="108" y="534" class="body">pointer traversal, and in-world material controls.</text>

  <circle cx="620" cy="250" r="24" fill="rgba(126,231,135,0.18)" stroke="#7ee787"/>
  <circle cx="613" cy="242" r="3.2" fill="#e6edf3"/>
  <circle cx="627" cy="242" r="3.2" fill="#e6edf3"/>
  <circle cx="613" cy="250" r="3.2" fill="#e6edf3"/>
  <circle cx="627" cy="250" r="3.2" fill="#e6edf3"/>
  <circle cx="613" cy="258" r="3.2" fill="#e6edf3"/>
  <circle cx="627" cy="258" r="3.2" fill="#e6edf3"/>
  <rect x="658" y="228" width="88" height="28" rx="14" fill="#7ee787"/>
  <text x="684" y="246" class="badge">ACTIVE</text>
  <text x="596" y="308" class="cardTitle">Braille Reader</text>
  <text x="596" y="336" class="mono">/braille-reader</text>
  <text x="596" y="382" class="section">PRIMARY ROLE</text>
  <text x="596" y="410" class="body">Deliver scene-native tactile reading from a bundled library</text>
  <text x="596" y="434" class="body">into a bounded Braille world with stable reference geometry.</text>
  <text x="596" y="482" class="section">CURRENT BASELINE</text>
  <text x="596" y="510" class="body">3D library launcher, segmented TXT or HTML or EPUB loading,</text>
  <text x="596" y="534" class="body">tactile page controls, and return to library in-scene.</text>

  <circle cx="1108" cy="250" r="24" fill="rgba(194,151,255,0.18)" stroke="#c297ff"/>
  <path d="M1096 241 H1111 L1115 247 H1123 V259 H1096 Z" class="iconStroke"/>
  <path d="M1102 253 H1117" class="iconStroke"/>
  <rect x="1146" y="228" width="118" height="28" rx="14" fill="#c297ff"/>
  <text x="1165" y="246" class="badge">PROTOTYPE</text>
  <text x="1084" y="308" class="cardTitle">Haptic Desktop</text>
  <text x="1084" y="336" class="mono">/haptic-desktop</text>
  <text x="1084" y="382" class="section">PRIMARY ROLE</text>
  <text x="1084" y="410" class="body">Present a controlled tactile workspace where users move</text>
  <text x="1084" y="434" class="body">between launcher, galleries, browser, and opened scenes.</text>
  <text x="1084" y="482" class="section">CURRENT BASELINE</text>
  <text x="1084" y="510" class="body">Workspace loading, paged galleries, typed file browser,</text>
  <text x="1084" y="534" class="body">detail plaques, and explicit return semantics.</text>

  <circle cx="256" cy="570" r="24" fill="rgba(242,204,96,0.18)" stroke="#f2cc60"/>
  <rect x="246" y="560" width="20" height="20" rx="3.5" class="iconStroke"/>
  <path d="M251 566 H261" class="iconStroke"/>
  <path d="M251 572 H261" class="iconStroke"/>
  <path d="M251 578 H258" class="iconStroke"/>
  <rect x="294" y="548" width="88" height="28" rx="14" fill="#f2cc60"/>
  <text x="320" y="566" class="badge">ACTIVE</text>
  <text x="232" y="628" class="cardTitle">Workspace Manager</text>
  <text x="232" y="656" class="mono">/haptic-workspace-manager</text>
  <text x="232" y="702" class="section">PRIMARY ROLE</text>
  <text x="232" y="730" class="body">Create and register structured workspace descriptors so</text>
  <text x="232" y="754" class="body">large external folders can feed the desktop safely.</text>
  <text x="232" y="802" class="section">CURRENT BASELINE</text>
  <text x="232" y="830" class="body">Demo bootstrap, descriptor creation, external-root</text>
  <text x="232" y="854" class="body">registration, and registry diagnostics.</text>

  <circle cx="984" cy="570" r="24" fill="rgba(255,123,114,0.18)" stroke="#ff7b72"/>
  <path d="M972 562 H988 V576 H972 Z" class="iconStroke"/>
  <path d="M980 576 V584" class="iconStroke"/>
  <path d="M975 567 H985" class="iconStroke"/>
  <rect x="1022" y="548" width="88" height="28" rx="14" fill="#ff7b72"/>
  <text x="1049" y="566" class="badge">ACTIVE</text>
  <text x="960" y="628" class="cardTitle">Haptic Configuration</text>
  <text x="960" y="656" class="mono">/haptic-configuration</text>
  <text x="960" y="702" class="section">PRIMARY ROLE</text>
  <text x="960" y="730" class="body">Make backend selection, SDK readiness, bridge readiness,</text>
  <text x="960" y="754" class="body">and contact-model assumptions explicit inside the app.</text>
  <text x="960" y="802" class="section">CURRENT BASELINE</text>
  <text x="960" y="830" class="body">Requested-backend selection, dependency tracking,</text>
  <text x="960" y="854" class="body">and collision or material design summaries.</text>

  <rect x="78" y="850" width="1444" height="126" rx="24" fill="#111827" stroke="#30363d" stroke-width="2"/>
  <text x="110" y="890" class="cardTitle">Shared Runtime Contract</text>
  <text x="110" y="922" class="body">All five routes inherit one dark workbench shell, one padded version source, one visual fallback backend, one browser-smoke baseline, and one recurring documentation plus SVG audit before a cycle can be closed.</text>

  <rect x="110" y="934" width="250" height="30" rx="15" fill="rgba(88,166,255,0.16)" stroke="#58a6ff"/>
  <text x="128" y="953" class="smallBadge">Real 3D scene as the primary pane</text>
  <rect x="384" y="934" width="262" height="30" rx="15" fill="rgba(126,231,135,0.16)" stroke="#7ee787"/>
  <text x="402" y="953" class="smallBadge">Help, runtime status, and version surface</text>
  <rect x="670" y="934" width="282" height="30" rx="15" fill="rgba(194,151,255,0.16)" stroke="#c297ff"/>
  <text x="688" y="953" class="smallBadge">Pointer emulation for no-device execution</text>
  <rect x="976" y="934" width="514" height="30" rx="15" fill="rgba(242,204,96,0.16)" stroke="#f2cc60"/>
  <text x="994" y="953" class="smallBadge">Documentation, diagrams, snapshots, and help text must match the shipped runtime</text>

  <path d="M440 798 V850" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M1164 798 V850" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="78" y="154" width="224" height="26" rx="13" fill="#79c0ff"/>
  <text x="101" y="172" class="badge">ROUTED WORKSPACES</text>
  <rect x="1294" y="154" width="228" height="26" rx="13" fill="rgba(255,255,255,0.10)" stroke="#30363d"/>
  <text x="1318" y="172" class="legend">Release line: 2.09.000 target baseline</text>
</svg>
