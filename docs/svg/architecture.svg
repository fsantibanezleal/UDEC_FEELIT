<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">FeelIT architecture</title>
  <desc id="desc">Architecture diagram for FeelIT showing five routed workspaces, shared API and domain services, runtime manager, fallback backend, and release-governed documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182233"/>
      <stop offset="100%" stop-color="#101722"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#142030"/>
      <stop offset="100%" stop-color="#0f1724"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#79c0ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0 L12 6 L0 12 Z" fill="#7ee787"/>
    </marker>
    <style>
      .title { font: 700 40px 'Segoe UI', sans-serif; fill: #e6edf3; }
      .subtitle { font: 400 18px 'Segoe UI', sans-serif; fill: #8b949e; }
      .lane { font: 700 14px 'Segoe UI', sans-serif; fill: #0d1117; letter-spacing: 1.8px; }
      .cardTitle { font: 700 22px 'Segoe UI', sans-serif; fill: #e6edf3; }
      .body { font: 400 16px 'Segoe UI', sans-serif; fill: #9fb0c3; }
      .mono { font: 400 14px Consolas, monospace; fill: #d7e2ee; }
      .legend { font: 600 14px 'Segoe UI', sans-serif; fill: #d3deea; }
      .badge { font: 700 12px 'Segoe UI', sans-serif; fill: #0d1117; letter-spacing: 1px; }
      .iconStroke { stroke: #e6edf3; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .iconFillBlue { fill: rgba(121,192,255,0.22); stroke: #79c0ff; stroke-width: 1.6; }
      .iconFillGreen { fill: rgba(126,231,135,0.20); stroke: #7ee787; stroke-width: 1.6; }
      .iconFillPurple { fill: rgba(194,151,255,0.20); stroke: #c297ff; stroke-width: 1.6; }
      .iconFillOrange { fill: rgba(255,166,87,0.20); stroke: #ffa657; stroke-width: 1.6; }
      .iconFillYellow { fill: rgba(242,204,96,0.20); stroke: #f2cc60; stroke-width: 1.6; }
      .iconFillRed { fill: rgba(255,123,114,0.20); stroke: #ff7b72; stroke-width: 1.6; }
    </style>
  </defs>

  <rect width="1600" height="1040" fill="url(#bg)"/>
  <circle cx="1460" cy="170" r="240" fill="#58a6ff" opacity="0.06"/>
  <circle cx="210" cy="900" r="240" fill="#39d2c0" opacity="0.05"/>
  <rect x="42" y="42" width="1516" height="956" rx="28" fill="none" stroke="#30363d" stroke-width="2"/>

  <text x="78" y="102" class="title">FeelIT Architecture</text>
  <text x="78" y="136" class="subtitle">Five dedicated routes now share one API, one domain core, one runtime manager, and one release discipline that keeps docs, SVGs, and snapshots aligned with the shipped state.</text>

  <rect x="78" y="174" width="224" height="30" rx="15" fill="#79c0ff"/>
  <text x="102" y="194" class="lane">FRONTEND ROUTES</text>
  <rect x="572" y="174" width="236" height="30" rx="15" fill="#7ee787"/>
  <text x="596" y="194" class="lane">API AND DOMAIN CORE</text>
  <rect x="1092" y="174" width="266" height="30" rx="15" fill="#ffa657"/>
  <text x="1118" y="194" class="lane">RUNTIME AND GOVERNANCE</text>

  <rect x="78" y="224" width="448" height="706" rx="24" fill="url(#panel)" stroke="#30363d" filter="url(#shadow)"/>
  <rect x="560" y="224" width="472" height="706" rx="24" fill="url(#panel)" stroke="#30363d" filter="url(#shadow)"/>
  <rect x="1066" y="224" width="446" height="706" rx="24" fill="url(#panel)" stroke="#30363d" filter="url(#shadow)"/>

  <rect x="106" y="254" width="128" height="154" rx="18" fill="url(#panelSoft)" stroke="#58a6ff"/>
  <circle cx="134" cy="288" r="16" class="iconFillBlue"/>
  <path d="M126 290 L134 284 L142 290 L142 300 L134 306 L126 300 Z" class="iconStroke"/>
  <path d="M134 284 L134 295" class="iconStroke"/>
  <path d="M126 290 L134 296 L142 290" class="iconStroke"/>
  <text x="158" y="290" class="cardTitle">Object</text>
  <text x="158" y="314" class="cardTitle">Explorer</text>
  <text x="122" y="342" class="mono">/object-explorer</text>
  <text x="122" y="372" class="body">Scene launcher,</text>
  <text x="122" y="394" class="body">multi-format mesh</text>
  <text x="122" y="416" class="body">staging, materials.</text>

  <rect x="248" y="254" width="128" height="154" rx="18" fill="url(#panelSoft)" stroke="#7ee787"/>
  <circle cx="276" cy="288" r="16" class="iconFillGreen"/>
  <circle cx="271" cy="282" r="2.4" fill="#e6edf3"/>
  <circle cx="281" cy="282" r="2.4" fill="#e6edf3"/>
  <circle cx="271" cy="288" r="2.4" fill="#e6edf3"/>
  <circle cx="281" cy="288" r="2.4" fill="#e6edf3"/>
  <circle cx="271" cy="294" r="2.4" fill="#e6edf3"/>
  <circle cx="281" cy="294" r="2.4" fill="#e6edf3"/>
  <text x="300" y="290" class="cardTitle">Braille</text>
  <text x="300" y="314" class="cardTitle">Reader</text>
  <text x="262" y="342" class="mono">/braille-reader</text>
  <text x="262" y="372" class="body">Library launcher,</text>
  <text x="262" y="394" class="body">segmented reading,</text>
  <text x="262" y="416" class="body">3D dot surface.</text>

  <rect x="390" y="254" width="108" height="154" rx="18" fill="url(#panelSoft)" stroke="#c297ff"/>
  <circle cx="416" cy="288" r="16" class="iconFillPurple"/>
  <path d="M408 280 H422 L426 286 H434 V296 H408 Z" class="iconStroke"/>
  <path d="M412 290 H426" class="iconStroke"/>
  <text x="440" y="290" class="cardTitle">Haptic</text>
  <text x="440" y="314" class="cardTitle">Desktop</text>
  <text x="406" y="342" class="mono">/haptic-desktop</text>
  <text x="406" y="372" class="body">Launcher,</text>
  <text x="406" y="394" class="body">galleries,</text>
  <text x="406" y="416" class="body">browser scenes.</text>

  <rect x="106" y="430" width="190" height="170" rx="18" fill="url(#panelSoft)" stroke="#f2cc60"/>
  <circle cx="138" cy="466" r="16" class="iconFillYellow"/>
  <rect x="130" y="458" width="16" height="16" rx="3" class="iconStroke"/>
  <path d="M134 462 H142" class="iconStroke"/>
  <path d="M134 468 H142" class="iconStroke"/>
  <path d="M134 474 H140" class="iconStroke"/>
  <text x="164" y="466" class="cardTitle">Workspace</text>
  <text x="164" y="490" class="cardTitle">Manager</text>
  <text x="124" y="518" class="mono">/haptic-workspace-manager</text>
  <text x="124" y="550" class="body">Descriptor creation,</text>
  <text x="124" y="572" class="body">registration, and</text>
  <text x="124" y="594" class="body">diagnostics.</text>

  <rect x="312" y="430" width="186" height="170" rx="18" fill="url(#panelSoft)" stroke="#ff7b72"/>
  <circle cx="344" cy="466" r="16" class="iconFillRed"/>
  <path d="M336 458 H352 V472 H336 Z" class="iconStroke"/>
  <path d="M344 472 V480" class="iconStroke"/>
  <path d="M339 463 H349" class="iconStroke"/>
  <text x="370" y="466" class="cardTitle">Haptic</text>
  <text x="370" y="490" class="cardTitle">Configuration</text>
  <text x="330" y="518" class="mono">/haptic-configuration</text>
  <text x="330" y="550" class="body">Requested runtime,</text>
  <text x="330" y="572" class="body">SDK diagnostics,</text>
  <text x="330" y="594" class="body">contact baseline.</text>

  <rect x="106" y="632" width="392" height="262" rx="18" fill="url(#panelSoft)" stroke="#39d2c0"/>
  <circle cx="142" cy="670" r="16" fill="rgba(57,210,192,0.20)" stroke="#39d2c0" stroke-width="1.6"/>
  <path d="M134 670 H150" class="iconStroke"/>
  <path d="M142 662 V678" class="iconStroke"/>
  <text x="170" y="668" class="cardTitle">Shared Frontend Contract</text>
  <text x="124" y="706" class="body">Dark technical shell, version badge, help modal, explicit mode</text>
  <text x="124" y="730" class="body">navigation, and route-owned workflow surfaces. Spatial pages keep</text>
  <text x="124" y="754" class="body">the real 3D world as the primary pane; non-spatial pages still keep</text>
  <text x="124" y="778" class="body">runtime and diagnostics visible. The configuration page makes the</text>
  <text x="124" y="802" class="body">haptic backend problem a visible product surface instead of hidden</text>
  <text x="124" y="826" class="body">internal engineering state.</text>

  <rect x="592" y="254" width="408" height="176" rx="18" fill="url(#panelSoft)" stroke="#79c0ff"/>
  <circle cx="628" cy="292" r="16" class="iconFillBlue"/>
  <rect x="620" y="284" width="16" height="16" rx="3" class="iconStroke"/>
  <path d="M624 288 H632" class="iconStroke"/>
  <path d="M624 294 H632" class="iconStroke"/>
  <path d="M624 300 H630" class="iconStroke"/>
  <text x="658" y="292" class="cardTitle">HTTP Delivery And Route Contracts</text>
  <text x="658" y="320" class="mono">app/main.py   app/api/routes.py</text>
  <text x="612" y="356" class="body">Serves five routes plus health, mode, materials, model, library,</text>
  <text x="612" y="380" class="body">workspace, device-status, and haptic-configuration endpoints.</text>

  <rect x="592" y="454" width="408" height="214" rx="18" fill="url(#panelSoft)" stroke="#7ee787"/>
  <circle cx="628" cy="492" r="16" class="iconFillGreen"/>
  <circle cx="623" cy="486" r="2.4" fill="#e6edf3"/>
  <circle cx="633" cy="486" r="2.4" fill="#e6edf3"/>
  <circle cx="623" cy="492" r="2.4" fill="#e6edf3"/>
  <circle cx="633" cy="492" r="2.4" fill="#e6edf3"/>
  <circle cx="623" cy="498" r="2.4" fill="#e6edf3"/>
  <circle cx="633" cy="498" r="2.4" fill="#e6edf3"/>
  <text x="658" y="492" class="cardTitle">Domain Services And Design Baselines</text>
  <text x="658" y="520" class="mono">braille.py   library_assets.py   demo_assets.py</text>
  <text x="658" y="544" class="mono">haptic_workspace.py   haptic_materials.py</text>
  <text x="658" y="568" class="mono">haptic_feedback_design.py</text>
  <text x="612" y="604" class="body">Keeps translation logic, catalogs, workspace descriptors,</text>
  <text x="612" y="628" class="body">material profiles, and the contact-model baseline independent</text>
  <text x="612" y="652" class="body">from route layout or one specific vendor SDK.</text>

  <rect x="592" y="692" width="408" height="202" rx="18" fill="url(#panelSoft)" stroke="#f2cc60"/>
  <circle cx="628" cy="730" r="16" class="iconFillYellow"/>
  <path d="M620 724 H636" class="iconStroke"/>
  <path d="M620 732 H636" class="iconStroke"/>
  <path d="M620 740 H632" class="iconStroke"/>
  <text x="658" y="730" class="cardTitle">Canonical Project State</text>
  <text x="658" y="758" class="mono">config.py   version.py   modes.py</text>
  <text x="612" y="794" class="body">One padded version source, one port assignment, one route</text>
  <text x="612" y="818" class="body">catalog, one runtime metadata surface, and one auditable</text>
  <text x="612" y="842" class="body">release history for the evolving modernization line.</text>

  <rect x="1098" y="254" width="382" height="176" rx="18" fill="url(#panelSoft)" stroke="#ffa657"/>
  <circle cx="1134" cy="292" r="16" class="iconFillOrange"/>
  <path d="M1126 286 H1142 V298 H1126 Z" class="iconStroke"/>
  <path d="M1134 298 V308" class="iconStroke"/>
  <text x="1164" y="292" class="cardTitle">Shared Scene Runtime</text>
  <text x="1164" y="320" class="mono">three_scene_common.js   app.js</text>
  <text x="1120" y="356" class="body">Provides bounded scenes, orbit controls, persistent camera</text>
  <text x="1120" y="380" class="body">state, pointer emulation, and startup diagnostics.</text>

  <rect x="1098" y="454" width="382" height="214" rx="18" fill="url(#panelSoft)" stroke="#ffa657"/>
  <circle cx="1134" cy="492" r="16" class="iconFillOrange"/>
  <rect x="1126" y="484" width="16" height="16" rx="3" class="iconStroke"/>
  <path d="M1122 490 H1126" class="iconStroke"/>
  <path d="M1122 496 H1126" class="iconStroke"/>
  <path d="M1142 490 H1146" class="iconStroke"/>
  <path d="M1142 496 H1146" class="iconStroke"/>
  <text x="1164" y="492" class="cardTitle">Runtime Manager And Backend Boundary</text>
  <text x="1164" y="520" class="mono">runtime_manager.py   bridge_probe.py   toolchain.py</text>
  <text x="1120" y="556" class="body">Tracks requested backend, active fallback backend, SDK roots,</text>
  <text x="1120" y="580" class="body">bridge paths, toolchain readiness, and vendor-aware probe state</text>
  <text x="1120" y="604" class="body">while keeping the visual emulator as the safe no-device runtime.</text>

  <rect x="1098" y="692" width="382" height="202" rx="18" fill="url(#panelSoft)" stroke="#ff7b72"/>
  <circle cx="1134" cy="730" r="16" class="iconFillRed"/>
  <path d="M1126 722 H1142 V738 H1126 Z" class="iconStroke"/>
  <path d="M1130 726 H1138" class="iconStroke"/>
  <path d="M1130 732 H1138" class="iconStroke"/>
  <text x="1164" y="730" class="cardTitle">Documentation, SVGs, And Evidence</text>
  <text x="1164" y="758" class="mono">README   docs/*.md   docs/svg   artifacts/</text>
  <text x="1120" y="794" class="body">Help content, diagrams, snapshots, and methodology history</text>
  <text x="1120" y="818" class="body">must move with the real runtime, including the haptic</text>
  <text x="1120" y="842" class="body">configuration and contact-model baseline.</text>

  <path d="M498 340 H592" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M498 548 H592" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M498 794 H592" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1000 340 H1098" fill="none" stroke="#79c0ff" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1000 560 H1098" fill="none" stroke="#7ee787" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M1000 792 H1098" fill="none" stroke="#7ee787" stroke-width="5" marker-end="url(#arrowGreen)"/>

  <rect x="78" y="952" width="1434" height="56" rx="18" fill="#111827" stroke="#30363d"/>
  <text x="110" y="987" class="legend">Legend: blue panels represent route-facing surfaces, green panels represent reusable domain contracts, orange panels represent runtime and backend boundaries, and red panels represent release-governed documentation and evidence duties.</text>
</svg>
