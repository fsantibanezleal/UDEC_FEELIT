name: FeelIT CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FeelIT dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff baseline validation
        run: python scripts/validate_repo.py --mode lint

  unit-and-api:
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FeelIT dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit and API validation
        run: python scripts/validate_repo.py --mode unit

  browser-smoke:
    runs-on: windows-latest
    needs: unit-and-api
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FeelIT dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Run browser smoke validation
        run: python scripts/validate_repo.py --mode smoke

      - name: Upload current smoke captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feelit-browser-smoke-current
          path: artifacts/frontend_snapshots/current
